<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/general.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/queries.css" />

    <script
      type="module"
      src="https://unpkg.com/ionicons@5.4.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule=""
      src="https://unpkg.com/ionicons@5.4.0/dist/ionicons/ionicons.js"
    ></script>

    <title>All Recipes - SnapEat</title>
  </head>
  <body>
    <!-- reuse the header from index for consistency -->
    <header class="header">
      <a href="index.html">
        <img class="logo" alt="SnapEat logo" src="img/snapeat.png" />
      </a>

      <nav class="main-nav">
        <ul class="main-nav-list">
          <li><a class="main-nav-link" href="index.html#how">How it works</a></li>
          <li><a class="main-nav-link" href="index.html#meals">Meals</a></li>
          <li><a class="main-nav-link" href="index.html#testimonials">Testimonials</a></li>
          <li><a class="main-nav-link" href="index.html#pricing">Pricing</a></li>
          <li><a class="main-nav-link" href="login.html">Login</a></li>
          <li><a class="main-nav-link nav-cta" href="signup.html">Sign up</a></li>
        </ul>
      </nav>

      <button class="btn-mobile-nav" aria-label="Toggle navigation" aria-expanded="false">
        <ion-icon class="icon-mobile-nav" name="menu-outline"></ion-icon>
        <ion-icon class="icon-mobile-nav" name="close-outline"></ion-icon>
      </button>
    </header>

    <main>
      <section class="section-meals">
        <div class="container center-text">
          <span class="subheading">All recipes</span>
          <h2 class="heading-secondary">Browse our full catalogue</h2>
        </div>

        <div class="container grid grid--3-cols margin-bottom-md" id="recipes-grid">
          <!-- recipes will be inserted here via JavaScript -->
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container grid grid--footer">
        <div class="logo-col">
          <a href="index.html" class="footer-logo">
            <img src="img/snapeat.png" alt="SnapEat logo" />
          </a>
          <ul class="social-links">
            <li>
              <a class="footer-link" href="#"
                ><ion-icon class="social-icon" name="logo-instagram"></ion-icon
              ></a>
            </li>
            <li>
              <a class="footer-link" href="#"
                ><ion-icon class="social-icon" name="logo-facebook"></ion-icon
              ></a>
            </li>
            <li>
              <a class="footer-link" href="#"
                ><ion-icon class="social-icon" name="logo-twitter"></ion-icon
              ></a>
            </li>
          </ul>

          <p class="copyright">
            Copyright &copy; 2027 by SnapEat, Inc. All rights reserved.
          </p>
        </div>
        <!-- address and nav omitted for brevity -->
      </div>
    </footer>

    <script>
      const btnNav = document.querySelector('.btn-mobile-nav');
      const headerEl = document.querySelector('.header');

      btnNav.addEventListener('click', function () {
        const open = headerEl.classList.toggle('nav-open');
        btnNav.setAttribute('aria-expanded', open);
      });

      window.addEventListener('scroll', function () {
        if (window.scrollY > 50) headerEl.classList.add('sticky');
        else headerEl.classList.remove('sticky');
      });

      // recipes data & rendering
      const recipes = [
        {
          img: 'img/meals/meal-1.jpg',
          title: 'Japanese Gyozas',
          tags: ['Vegetarian'],
          calories: 650,
        },
        {
          img: 'img/meals/meal-2.jpg',
          title: 'Avocado Salad',
          tags: ['Vegan', 'Paleo'],
          calories: 400,
        },
        {
          img: 'img/meals/pad thai.jpg',
          title: 'Pad Thai',
          tags: ['Pescatarian'],
          calories: 800,
        },
        {
          img: 'img/meals/Green Bowl.jpg',
          title: 'Green Bowl',
          tags: ['Vegan', 'Gluten-free'],
          calories: 500,
        },
        {
          img: 'img/meals/Burger.jpg',
          title: 'Burger',
          tags: ['Keto'],
          calories: 750,
        },
        {
          img: 'img/meals/Salmon.jpg',
          title: 'Salmon',
          tags: ['Pescatarian'],
          calories: 700,
        },
      ];

      function renderRecipes() {
        const grid = document.getElementById('recipes-grid');
        recipes.forEach((r) => {
          const mealDiv = document.createElement('div');
          mealDiv.className = 'meal';
          mealDiv.innerHTML = `
            <img src="${r.img}" class="meal-img" alt="${r.title}" />
            <div class="meal-content">
              <div class="meal-tags">
                ${r.tags.map((t) => `<span class="tag tag--${t.toLowerCase()}">${t}</span>`).join('')}
              </div>
              <p class="meal-title">${r.title}</p>
              <ul class="meal-attributes">
                <li class="meal-attribute">
                  <ion-icon class="meal-icon" name="flame-outline"></ion-icon>
                  <span>${r.calories} calories</span>
                </li>
              </ul>
            </div>
          `;
          grid.appendChild(mealDiv);
        });
      }

      renderRecipes();
    </script>
  </body>
</html>
